<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEXUS FX WAR ROOM</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#020208;--p:#07070f;--p2:#111124;--ln:#2d2d50;
--g:#00e676;--r:#ff1744;--c:#00e5ff;--gray:#b7b7c3;--dark:#171726;
}
html,body{
width:100%;height:100%;
background:var(--bg);color:#fff;
font-family:"Segoe UI","Helvetica Neue",Arial,"Hiragino Sans",Meiryo,sans-serif;
overflow:hidden;
}
#app{
height:100vh;
display:grid;
grid-template-rows:50px 46px 30px minmax(0,1fr) 310px 20px;
gap:3px;
padding:3px;
}
.card,.box{
background:var(--p);
border:1px solid var(--ln);
border-radius:4px;
overflow:hidden;
}
.hd{
height:24px;
padding:0 8px;
border-bottom:1px solid var(--ln);
display:flex;
align-items:center;
justify-content:space-between;
background:#04040b;
color:var(--gray);
font-size:11px;
font-weight:900;
}
#topbar{
display:grid;
grid-template-columns:245px 90px 115px 1fr;
gap:3px;
}
.box{
padding:5px 8px;
display:flex;
align-items:center;
}
.l1{
font-size:13px;
font-weight:900;
color:var(--gray);
letter-spacing:.8px;
}
.l2{
font-size:8px;
color:#8c8c99;
font-weight:900;
}
.liveWrap{
font-size:13px;
font-weight:900;
color:var(--g);
display:flex;
align-items:center;
gap:7px;
}
.liveDot{
width:9px;
height:9px;
border-radius:50%;
background:var(--r);
display:inline-block;
animation:redFlash .8s infinite;
box-shadow:0 0 10px rgba(255,23,68,.9);
}
.btn{
width:100%;
height:25px;
background:rgba(0,230,118,.08);
border:1px solid var(--g);
color:var(--g);
border-radius:4px;
font-weight:900;
font-size:10px;
cursor:pointer;
transition:.2s;
}
.btn:hover{background:rgba(0,230,118,.18)}
.btn.off{
background:#15151d;
border-color:#5a5a7a;
color:#aaa;
}
.timeBox{justify-content:center}
.timeText{
color:var(--g);
font-size:14px;
font-weight:900;
font-family:monospace;
}

/* 1段目 TradingView価格バー：DXYなし */
#tvPriceBar{
height:46px;
overflow:hidden;
border:1px solid var(--ln);
background:#050509;
border-radius:4px;
}
#tvPriceBar iframe{
height:46px!important;
min-height:46px!important;
max-height:46px!important;
}

/* 2段目バナー：SESSION + HIGH IMPACT NEWSのみ */
.flowLine{
height:30px;
position:relative;
overflow:hidden;
white-space:nowrap;
background:#050509;
border:1px solid var(--ln);
border-radius:4px;
}
.flowInner{
position:absolute;
white-space:nowrap;
animation:flow 95s linear infinite;
font-size:13px;
font-weight:900;
line-height:28px;
}
@keyframes flow{
from{transform:translateX(100vw)}
to{transform:translateX(-100%)}
}
.bannerSession{
color:var(--gray);
margin:0 16px;
}
.bannerOpen{
color:var(--r);
animation:redFlash .9s infinite;
text-shadow:0 0 8px rgba(255,23,68,.8);
}
.bannerTime{
color:var(--g);
font-family:monospace;
font-weight:900;
}
.bannerImpact{
color:#fff;
margin:0 18px;
}
.bannerImpact .dt{
color:var(--g);
font-family:monospace;
font-weight:900;
}
.bannerImpact .ccy{
color:var(--gray);
font-weight:900;
}
.bannerImpact .impactHigh{
color:#cfcfd8;
font-weight:900;
}
.bannerImpact .impactExtreme{
color:var(--r);
font-weight:900;
animation:redFlash .9s infinite;
}

/* 共通点滅 */
@keyframes redFlash{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes blueFlash{0%,100%{opacity:1}50%{opacity:.35}}

#main{
display:grid;
grid-template-columns:minmax(0,1fr) 600px;
gap:3px;
min-height:0;
}
#chart{
height:calc(100% - 24px);
background:#000;
}
#tv_chart{width:100%;height:100%}
#right{
display:grid;
grid-template-rows:205px minmax(0,1fr);
gap:3px;
min-height:0;
}

/* SESSION CENTER */
.sessionBody{
height:calc(100% - 24px);
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:5px;
padding:6px;
}
.sBox{
background:var(--p2);
border:1px solid var(--ln);
border-radius:4px;
padding:10px 8px;
overflow:hidden;
transition:.2s;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}
.sBox:hover{background:#161622}
.sTitle{
font-size:16px;
font-weight:900;
letter-spacing:1.2px;
line-height:1;
color:var(--gray);
}
.sTitle.openTitle{
color:var(--r);
animation:redFlash 1s infinite;
text-shadow:0 0 10px rgba(255,23,68,.8);
}
.sState{
font-size:17px;
font-weight:900;
margin-top:12px;
color:#fff;
}
.sState.closed{color:#8f8f9c}
.sLine{
font-size:22px;
color:var(--g);
font-weight:900;
margin-top:10px;
line-height:1;
font-family:monospace;
}

/* LIVE NEWS */
.liveNewsWrap{
height:calc(100% - 24px);
display:grid;
grid-template-rows:78px 32px minmax(0,1fr);
gap:4px;
padding:4px;
}
.videoRow{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:4px;
}
.videoBtn{
background:#0b0b12;
border:1px solid #34121a;
border-radius:4px;
color:#fff;
font-size:10px;
font-weight:900;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
cursor:pointer;
transition:.2s;
}
.videoBtn:hover{
background:var(--dark);
border-color:var(--r);
box-shadow:0 0 10px rgba(255,23,68,.25);
}
.videoBtn .dot{
width:7px;
height:7px;
border-radius:50%;
background:var(--r);
display:inline-block;
margin-left:5px;
animation:redFlash .8s infinite;
}
.newsTabs{
display:flex;
gap:4px;
}
.newsTab{
flex:1;
background:#10101d;
color:var(--gray);
border:1px solid var(--ln);
border-radius:4px;
font-size:11px;
font-weight:900;
cursor:pointer;
transition:.2s;
}
.newsTab:hover{
background:#1b1b2c;
border-color:#50507c;
}
.newsTab.active{
border-color:#3a3a5c;
color:var(--gray);
}
.newsList{
overflow-y:auto;
border:1px solid var(--ln);
border-radius:4px;
}
.newsItem{
display:grid;
grid-template-columns:50px 70px 1fr 18px;
gap:5px;
align-items:center;
border-bottom:1px solid #1a1a2e;
padding
